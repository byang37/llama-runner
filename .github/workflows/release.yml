name: Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Install MinGW via MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-binutils
          update: false
      - name: Build
        run: |
          $env:PATH = "C:\msys64\mingw64\bin;" + $env:PATH
          windres -i app.rc -o resource.syso -O coff -F pe-x86-64
          go build -ldflags="-H windowsgui -s -w" -o llama-runner-windows-amd64.exe .
        env:
          CGO_ENABLED: 1
          GOOS: windows
          GOARCH: amd64
      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: llama-runner-windows-amd64.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
          # webview_go hardcodes webkit2gtk-4.0 in CGO flags;
          # symlink the 4.1 pkg-config file so it resolves correctly.
          sudo ln -sf \
            /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc \
            /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc
      - name: Build
        run: |
          go build -ldflags="-s -w" -o llama-runner-linux-amd64 .
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: amd64
      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: llama-runner-linux-amd64

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build
        run: |
          mkdir -p llama-runner.app/Contents/MacOS
          mkdir -p llama-runner.app/Contents/Resources
          go build -ldflags="-s -w" -o llama-runner.app/Contents/MacOS/llama-runner .
          cat > llama-runner.app/Contents/Info.plist << 'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>     <string>llama-runner</string>
              <key>CFBundleIdentifier</key>     <string>io.github.llama-runner-go</string>
              <key>CFBundleName</key>           <string>LLaMA Runner</string>
              <key>CFBundleVersion</key>        <string>1.0.0</string>
              <key>NSHighResolutionCapable</key> <true/>
          </dict>
          </plist>
          XML
          zip -r llama-runner-macos-amd64.zip llama-runner.app
        env:
          CGO_ENABLED: 1
          GOOS: darwin
          GOARCH: amd64
      - uses: actions/upload-artifact@v4
        with:
          name: macos-amd64
          path: llama-runner-macos-amd64.zip

  release:
    needs: [ build-windows, build-linux, build-macos ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate changelog from commits
        if: github.event_name == 'push'
        id: commit_log
        run: |
          PREV=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" ${PREV}..HEAD)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Release (from direct push — commit log)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.commit_log.outputs.CHANGELOG }}
          files: |
            llama-runner-windows-amd64.exe
            llama-runner-linux-amd64
            llama-runner-macos-amd64.zip

      - name: Release (from PR merge — auto release notes)
        if: github.event_name != 'push'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            llama-runner-windows-amd64.exe
            llama-runner-linux-amd64
            llama-runner-macos-amd64.zip