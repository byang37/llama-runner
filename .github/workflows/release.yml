name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Install TDM-GCC
        run: |
          choco install tdm-gcc -y
          echo "C:\TDM-GCC-64\bin" >> $env:GITHUB_PATH
      - name: Build
        run: |
          windres -i app.rc -o resource.syso -O coff -F pe-x86-64
          go build -ldflags="-H windowsgui -s -w" -o llama-runner-windows-amd64.exe .
        env:
          CGO_ENABLED: 1
          GOOS: windows
          GOARCH: amd64
      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: llama-runner-windows-amd64.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev
      - name: Build
        run: |
          go build -ldflags="-s -w" -o llama-runner-linux-amd64 .
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: amd64
      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: llama-runner-linux-amd64

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build
        run: |
          mkdir -p llama-runner.app/Contents/MacOS
          mkdir -p llama-runner.app/Contents/Resources
          go build -ldflags="-s -w" -o llama-runner.app/Contents/MacOS/llama-runner .
          cat > llama-runner.app/Contents/Info.plist << 'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>     <string>llama-runner</string>
              <key>CFBundleIdentifier</key>     <string>io.github.llama-runner-go</string>
              <key>CFBundleName</key>           <string>LLaMA Runner</string>
              <key>CFBundleVersion</key>        <string>1.0.0</string>
              <key>NSHighResolutionCapable</key> <true/>
          </dict>
          </plist>
          XML
          zip -r llama-runner-macos-amd64.zip llama-runner.app
        env:
          CGO_ENABLED: 1
          GOOS: darwin
          GOARCH: amd64
      - uses: actions/upload-artifact@v4
        with:
          name: macos-amd64
          path: llama-runner-macos-amd64.zip

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            llama-runner-windows-amd64.exe
            llama-runner-linux-amd64
            llama-runner-macos-amd64.zip
          generate_release_notes: true